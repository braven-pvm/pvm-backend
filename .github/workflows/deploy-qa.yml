name: Deploy QA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-qa.yml"
      - "backend/**"
      - "frontend/workbench/**"
      - "infra/azure/**"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-qa
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: rg-pvm-integrations-qa
  AZURE_LOCATION: southafricanorth
  ACR_NAME: acrpvmintegrationsqa
  ACR_LOGIN_SERVER: acrpvmintegrationsqa.azurecr.io
  KEY_VAULT_NAME: kv-pvm-int-qa
  API_IMAGE: pvm-api
  WORKBENCH_IMAGE: pvm-workbench

jobs:
  deploy:
    name: Build and deploy QA
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/workbench/package-lock.json

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify backend
        run: dotnet test backend/Pvm.sln --configuration Release

      - name: Verify workbench
        working-directory: frontend/workbench
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Resolve deployment values
        id: values
        shell: bash
        run: |
          set -euo pipefail
          image_tag="qa-${GITHUB_SHA::12}"
          connection_string="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name connectionstrings--pvm --query value -o tsv)"
          postgres_password="$(printf '%s' "$connection_string" | sed -n 's/.*Password=\([^;]*\).*/\1/p')"
          auth_tenant_id="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name auth--tenantid --query value -o tsv)"
          auth_api_client_id="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name auth--api-clientid --query value -o tsv)"
          auth_workbench_client_id="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name auth--workbench-clientid --query value -o tsv)"
          auth_workbench_client_secret="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name auth--workbench-clientsecret --query value -o tsv)"
          auth_api_scope="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name auth--apiscope --query value -o tsv)"
          auth_nextauth_secret="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name auth--nextauthsecret --query value -o tsv)"
          auth_bootstrap_admin_email="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name auth--bootstrapadminemails --query value -o tsv)"
          auth_bootstrap_admin_object_id="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name auth--bootstrapadminobjectids --query value -o tsv)"

          if [ -z "$postgres_password" ]; then
            echo "Could not extract PostgreSQL password from Key Vault connection string." >&2
            exit 1
          fi

          required_values=(
            "auth_tenant_id"
            "auth_api_client_id"
            "auth_workbench_client_id"
            "auth_workbench_client_secret"
            "auth_api_scope"
            "auth_nextauth_secret"
            "auth_bootstrap_admin_email"
            "auth_bootstrap_admin_object_id"
          )
          for value_name in "${required_values[@]}"; do
            if [ -z "${!value_name}" ]; then
              echo "Missing required auth deployment value: $value_name" >&2
              exit 1
            fi
          done

          echo "::add-mask::$postgres_password"
          echo "::add-mask::$auth_workbench_client_secret"
          echo "::add-mask::$auth_nextauth_secret"

          {
            echo "image_tag=$image_tag"
            echo "postgres_password<<EOF"
            echo "$postgres_password"
            echo "EOF"
            echo "auth_tenant_id=$auth_tenant_id"
            echo "auth_api_client_id=$auth_api_client_id"
            echo "auth_workbench_client_id=$auth_workbench_client_id"
            echo "auth_workbench_client_secret<<EOF"
            echo "$auth_workbench_client_secret"
            echo "EOF"
            echo "auth_api_scope=$auth_api_scope"
            echo "auth_nextauth_secret<<EOF"
            echo "$auth_nextauth_secret"
            echo "EOF"
            echo "auth_bootstrap_admin_email=$auth_bootstrap_admin_email"
            echo "auth_bootstrap_admin_object_id=$auth_bootstrap_admin_object_id"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        run: |
          az acr login --name "$ACR_NAME"
          docker build \
            -t "$ACR_LOGIN_SERVER/$API_IMAGE:${{ steps.values.outputs.image_tag }}" \
            -t "$ACR_LOGIN_SERVER/$API_IMAGE:qa-latest" \
            -f backend/src/Pvm.Api/Dockerfile .
          docker push "$ACR_LOGIN_SERVER/$API_IMAGE:${{ steps.values.outputs.image_tag }}"
          docker push "$ACR_LOGIN_SERVER/$API_IMAGE:qa-latest"

      - name: Build and push workbench image
        run: |
          docker build \
            -t "$ACR_LOGIN_SERVER/$WORKBENCH_IMAGE:${{ steps.values.outputs.image_tag }}" \
            -t "$ACR_LOGIN_SERVER/$WORKBENCH_IMAGE:qa-latest" \
            -f frontend/workbench/Dockerfile frontend/workbench
          docker push "$ACR_LOGIN_SERVER/$WORKBENCH_IMAGE:${{ steps.values.outputs.image_tag }}"
          docker push "$ACR_LOGIN_SERVER/$WORKBENCH_IMAGE:qa-latest"

      - name: Deploy Bicep
        run: |
          az deployment sub create \
            --name "pvm-integrations-qa-${{ github.run_number }}" \
            --location "$AZURE_LOCATION" \
            --template-file infra/azure/main.bicep \
            --parameters infra/azure/main.parameters.qa.json \
            --parameters postgresAdminPassword='${{ steps.values.outputs.postgres_password }}' \
            --parameters apiImageTag='${{ steps.values.outputs.image_tag }}' \
            --parameters workbenchImageTag='${{ steps.values.outputs.image_tag }}' \
            --parameters authMode=Entra \
            --parameters authTenantId='${{ steps.values.outputs.auth_tenant_id }}' \
            --parameters authApiClientId='${{ steps.values.outputs.auth_api_client_id }}' \
            --parameters authWorkbenchClientId='${{ steps.values.outputs.auth_workbench_client_id }}' \
            --parameters authWorkbenchClientSecret='${{ steps.values.outputs.auth_workbench_client_secret }}' \
            --parameters authApiScope='${{ steps.values.outputs.auth_api_scope }}' \
            --parameters authNextAuthSecret='${{ steps.values.outputs.auth_nextauth_secret }}' \
            --parameters authBootstrapAdminEmail='${{ steps.values.outputs.auth_bootstrap_admin_email }}' \
            --parameters authBootstrapAdminObjectId='${{ steps.values.outputs.auth_bootstrap_admin_object_id }}' \
            --parameters workbenchPublicUrl="https://ca-pvm-workbench-qa.lemonocean-3257d28f.southafricanorth.azurecontainerapps.io" \
            --only-show-errors

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          api_url="$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n ca-pvm-api-qa --query "properties.configuration.ingress.fqdn" -o tsv)"
          workbench_url="$(az containerapp show -g "$AZURE_RESOURCE_GROUP" -n ca-pvm-workbench-qa --query "properties.configuration.ingress.fqdn" -o tsv)"

          curl --fail --show-error --silent "https://$api_url/health"
          candidates_status="$(curl --show-error --silent --output /dev/null --write-out "%{http_code}" "https://$api_url/api/invoices/candidates")"
          if [ "$candidates_status" != "401" ]; then
            echo "Expected anonymous invoice candidates request to return 401, got $candidates_status." >&2
            exit 1
          fi

          workbench_status="$(curl --location --show-error --silent --output /dev/null --write-out "%{http_code}" "https://$workbench_url/invoices")"
          if [ "$workbench_status" != "200" ]; then
            echo "Expected workbench auth flow to resolve to a 200 sign-in page, got $workbench_status." >&2
            exit 1
          fi

          echo "API: https://$api_url"
          echo "Workbench: https://$workbench_url"
